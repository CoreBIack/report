name: Working CI Pipeline

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test-and-lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run lint gate
        run: flake8 cart.py tests

      - name: Run full test suite
        run: python -m unittest discover -s tests -v

      - name: Build Docker image
        run: docker build -t virtua-static-site:ci .

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          curl -fsS "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy hook triggered successfully."
